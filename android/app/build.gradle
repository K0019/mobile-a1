plugins {
    id 'com.android.application'
}

android {
    namespace 'com.magicengine.kurorekishi'
    compileSdk 34

    defaultConfig {
        applicationId "com.ryengine.vulkan"
        minSdk 30
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }

        externalNativeBuild {
            cmake {
                targets "ryEngineAndroid"
                cppFlags "-std=c++20"
                arguments "-DCMAKE_PREFIX_PATH=${project.rootDir}/install"
            }
        }
    }

    aaptOptions {
        noCompress 'png', 'ktx', 'data', 'gltf', 'bin'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
        debug {
            debuggable true
            jniDebuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    
    ndkVersion "29.0.14206865"
    
    externalNativeBuild {
        cmake {
            path file('./src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    dependencies {
        implementation files('libs/fmod.jar')
    }
}