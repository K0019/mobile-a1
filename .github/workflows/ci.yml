name: CI Testing for all configs

on:
  pull_request:
    branches: '**'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild path
        uses: microsoft/setup-msbuild@v1.3

      - name: Build solution
        run: msbuild DigipenEngine/7percent.sln /p:Configuration=Debug /p:Platform="x64"

      - name: Run tests
        run: |
          ./DigipenEngine/bin/CI-Debug-x64/CITest.exe --gtest_output=xml:results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml
