name: CI Tests for all configs

on:
  pull_request:
    branches: '**'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install vcpkg and GTest
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg.exe install gtest

      - name: Integrate vcpkg install
        run: .\vcpkg\vcpkg.exe integrate install

      - name: Setup MSBuild path
        uses: microsoft/setup-msbuild@v1.3

      - name: Build solution
        run: msbuild DigipenEngine/7percent.sln /p:Configuration=Debug

      - name: Run tests
        run: |
          vstest.console.exe "/x64/Debug/CITest.exe" --gtest_output=xml:results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml
